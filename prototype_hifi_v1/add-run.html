<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Run - BazaarChecklist Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="prototype-body">
    <div class="device-shell">
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span>9:41</span>
          <div class="status-icons">
            <i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i>
          </div>
        </div>
        <main class="screen-content">
          <div class="flex items-center justify-between mb-4">
            <button class="icon-button"><i class="fa-solid fa-xmark"></i></button>
            <h1 class="text-lg font-semibold">Add Run</h1>
            <button class="text-sm font-semibold text-indigo-600" data-submit-run>Save</button>
          </div>

          <div class="space-y-3">
            <section class="glass-card p-4">
              <label class="text-xs font-semibold text-slate-500">Hero</label>
              <select data-hero-value class="mt-2 w-full rounded-xl border border-slate-200 bg-white p-3 text-sm">
                <option value="">Select hero</option>
                <option value="dooley">Dooley</option>
                <option value="mak">Mak</option>
                <option value="pygmalien">Pygmalien</option>
              </select>
            </section>

            <section class="glass-card p-4">
              <div class="flex items-center justify-between">
                <label class="text-xs font-semibold text-slate-500">Mode</label>
                <div class="segmented" data-segmented>
                  <button class="segment active" data-segment>Ranked</button>
                  <button class="segment" data-segment>Normal</button>
                </div>
              </div>
            </section>

            <section class="glass-card p-4">
              <label class="text-xs font-semibold text-slate-500">Wins (0-10)</label>
              <input data-wins-input type="range" min="0" max="10" value="7" class="mt-2 w-full" />
              <div class="flex items-center justify-between mt-2 text-sm">
                <span>7 wins</span>
                <label class="inline-flex items-center gap-2 text-slate-600">
                  <input data-perfect-toggle type="checkbox" class="h-4 w-4" />
                  Perfect
                </label>
              </div>
            </section>

            <section class="glass-card p-4">
              <div class="flex items-center justify-between mb-2">
                <label class="text-xs font-semibold text-slate-500">Board Items</label>
                <button class="text-xs text-indigo-600 font-semibold">+ Add Item</button>
              </div>
              <input type="hidden" data-board-count value="0" />
              <div class="text-sm text-slate-500">No items selected yet.</div>
            </section>

            <section class="glass-card p-4">
              <label class="text-xs font-semibold text-slate-500">Notes (max 500)</label>
              <textarea rows="4" class="mt-2 w-full rounded-xl border border-slate-200 p-3 text-sm" placeholder="Optional strategy notes"></textarea>
            </section>

            <p data-run-error class="hidden text-xs text-rose-600 font-semibold">Hero and at least one board item are required before saving.</p>
          </div>
        </main>
      </div>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
