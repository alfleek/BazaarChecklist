<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account - BazaarChecklist Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="prototype-body">
    <div class="device-shell">
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span>9:41</span>
          <div class="status-icons">
            <i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i>
          </div>
        </div>
        <main class="screen-content">
          <div class="flex items-center justify-between mb-4">
            <button class="icon-button"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-semibold">Account</h1>
            <button class="icon-button"><i class="fa-solid fa-gear"></i></button>
          </div>
          <section class="glass-card p-5 mb-4">
            <div class="flex items-center gap-4">
              <img class="w-16 h-16 rounded-2xl object-cover" src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&w=200&q=80" alt="Profile" />
              <div>
                <h2 class="font-semibold">lewis@example.com</h2>
                <p class="text-xs text-slate-500 mt-1">Synced with Firebase</p>
              </div>
            </div>
          </section>
          <section class="glass-card p-4 mb-4">
            <div class="flex items-center justify-between py-2 text-sm">
              <span>Total runs synced</span><strong>128</strong>
            </div>
            <div class="flex items-center justify-between py-2 text-sm">
              <span>Guest runs merged</span><strong>16</strong>
            </div>
            <div class="flex items-center justify-between py-2 text-sm">
              <span>Current challenge tier</span><strong>Gold</strong>
            </div>
          </section>
          <section class="glass-card p-4 mb-4">
            <button class="w-full rounded-xl border border-slate-200 py-3 text-sm font-semibold">Sign out</button>
          </section>
          <p class="screen-note">Unofficial tracker and not affiliated with The Bazaar.</p>
        </main>
      </div>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
