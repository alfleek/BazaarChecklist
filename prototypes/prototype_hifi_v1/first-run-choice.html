<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Run Choice - BazaarChecklist Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="prototype-body">
    <div class="device-shell">
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span>9:41</span>
          <div class="status-icons">
            <i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i>
          </div>
        </div>
        <main class="screen-content flex items-center">
          <section class="glass-card p-6 w-full">
            <img class="w-full h-44 rounded-2xl object-cover mb-5" src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?auto=format&fit=crop&w=1200&q=80" alt="Onboarding visual" />
            <h1 class="text-xl font-semibold">Welcome to BazaarChecklist</h1>
            <p class="text-sm text-slate-500 mt-2">Track every run, measure build coverage, and finish challenge checklists with confidence.</p>
            <div class="space-y-3 mt-6">
              <button class="w-full rounded-xl bg-indigo-600 text-white py-3 text-sm font-semibold">Sign in or create account</button>
              <button class="w-full rounded-xl border border-slate-200 py-3 text-sm font-semibold">Continue as guest</button>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
