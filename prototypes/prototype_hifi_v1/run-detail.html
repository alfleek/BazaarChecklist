<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Run Detail - BazaarChecklist Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="prototype-body">
    <div class="device-shell">
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span>9:41</span>
          <div class="status-icons">
            <i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i>
          </div>
        </div>
        <main class="screen-content">
          <div class="flex items-center justify-between mb-4">
            <button class="icon-button"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-semibold">Run Detail</h1>
            <button class="icon-button"><i class="fa-solid fa-ellipsis"></i></button>
          </div>
          <section class="glass-card p-4 mb-4">
            <img class="w-full h-40 object-cover rounded-2xl mb-3" src="https://images.unsplash.com/photo-1486572788966-cfd3df1f5b42?auto=format&fit=crop&w=1200&q=80" alt="Run board" />
            <div class="flex justify-between items-center">
              <h2 class="font-semibold">Perfect Diamond Push</h2>
              <span class="tier-pill tier-perfect"><i class="fa-regular fa-gem"></i>Perfect</span>
            </div>
            <p class="text-sm text-slate-500 mt-1">Dooley • Ranked • 10 wins • Mar 22, 9:13 PM</p>
          </section>

          <section class="glass-card p-4 mb-4">
            <h3 class="font-semibold text-sm mb-3">Board Items</h3>
            <div class="grid grid-cols-2 gap-2 text-sm">
              <div class="rounded-xl bg-slate-50 p-3">Ember Core</div>
              <div class="rounded-xl bg-slate-50 p-3">Burned Sigil</div>
              <div class="rounded-xl bg-slate-50 p-3">Phoenix Lens</div>
              <div class="rounded-xl bg-slate-50 p-3">Voltaic Band</div>
            </div>
          </section>

          <section class="glass-card p-4">
            <h3 class="font-semibold text-sm mb-2">Notes</h3>
            <p class="text-sm text-slate-600">Swapped into economy line on day 4 and stabilized with defensive tempo. Keep this route for ranked ladder consistency.</p>
          </section>
        </main>
      </div>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
