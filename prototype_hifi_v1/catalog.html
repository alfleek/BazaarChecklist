<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalog - BazaarChecklist Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="prototype-body">
    <div class="device-shell">
      <div class="phone-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span>9:41</span>
          <div class="status-icons">
            <i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i>
          </div>
        </div>
        <main class="screen-content">
          <header class="app-header">
            <div>
              <h1>Catalog</h1>
              <p>Search and filter</p>
            </div>
            <button class="icon-button"><i class="fa-regular fa-user"></i></button>
          </header>

          <section class="glass-card p-4 mb-4">
            <div class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2 bg-white">
              <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
              <input type="text" value="ember" class="w-full bg-transparent text-sm outline-none" />
            </div>
            <div class="mt-3 flex items-center justify-between">
              <span class="text-xs text-slate-500">Sort</span>
              <div class="segmented" data-segmented>
                <button class="segment active" data-segment>A-Z</button>
                <button class="segment" data-segment>Most won</button>
              </div>
            </div>
            <div class="chip-row mt-3">
              <button class="chip active" data-chip>Hero: Dooley</button>
              <button class="chip" data-chip>Type: Burn</button>
              <button class="chip active" data-chip>Rarity: Gold</button>
              <button class="chip" data-chip>Size: Medium</button>
              <button class="chip" data-chip>Won: At least once</button>
            </div>
          </section>

          <div class="space-y-3">
            <article class="list-item">
              <img class="w-16 h-16 rounded-xl object-cover" src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?auto=format&fit=crop&w=200&q=80" alt="Catalog item" />
              <div class="flex-1">
                <h3 class="text-sm font-semibold">Ember Core</h3>
                <p class="text-xs text-slate-500 mt-1">Burn • Engine • Medium</p>
                <div class="mt-2 flex items-center justify-between">
                  <span class="text-xs text-emerald-600 font-semibold">Won 14 times</span>
                  <span class="tier-pill tier-gold">Best: Gold</span>
                </div>
              </div>
            </article>
            <article class="list-item">
              <img class="w-16 h-16 rounded-xl object-cover" src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=200&q=80" alt="Catalog item" />
              <div class="flex-1">
                <h3 class="text-sm font-semibold">Cinder Sigil</h3>
                <p class="text-xs text-slate-500 mt-1">Burn • Utility • Small</p>
                <div class="mt-2 flex items-center justify-between">
                  <span class="text-xs text-emerald-600 font-semibold">Won 8 times</span>
                  <span class="tier-pill tier-silver">Best: Silver</span>
                </div>
              </div>
            </article>
          </div>
        </main>
        <nav class="bottom-tab">
          <button class="tab-item"><i class="fa-solid fa-trophy"></i><span>Runs</span></button>
          <button class="tab-item active"><i class="fa-solid fa-layer-group"></i><span>Catalog</span></button>
          <button class="tab-item"><i class="fa-solid fa-list-check"></i><span>Challenges</span></button>
        </nav>
      </div>
    </div>
    <script src="assets/app.js"></script>
  </body>
</html>
